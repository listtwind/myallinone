<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Progress Widget</title>
<style>
    /* 全局重置与居中 */
    body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* 容器：已剔除虚线边框 */
    .widget-container {
        padding: 20px 24px;
        width: 100%;
        max-width: 450px;
        box-sizing: border-box;
    }

    /* 进度条组 */
    .progress-group {
        display: flex;
        flex-direction: column;
        gap: 12px; 
    }
    
    /* 单行布局：左侧进度条，右侧文字 */
    .progress-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
    }

    /* 进度条外框：胶囊状带内边距 */
    .progress-outline {
        flex-grow: 1;
        height: 22px;
        border: 2px solid #4f4f4f;
        border-radius: 12px;
        padding: 2px; 
        box-sizing: border-box;
        display: flex;
    }

    /* 进度条填充物 */
    .progress-fill {
        height: 100%;
        background-color: #4f4f4f;
        border-radius: 8px; 
        width: 0%; 
        transition: width 1s linear; /* 改为线性过渡，匹配时间流逝的客观规律 */
    }

    /* 右侧百分比文本 */
    .progress-text {
        margin: 0;
        font-size: 15px;
        color: #4f4f4f;
        min-width: 80px; 
    }
</style>
</head>
<body>

<div class="widget-container">
    <div class="progress-group">
        <div class="progress-item">
            <div class="progress-outline">
                <div class="progress-fill" id="fill-year"></div>
            </div>
            <p class="progress-text" id="text-year">Year: 0%</p>
        </div>

        <div class="progress-item">
            <div class="progress-outline">
                <div class="progress-fill" id="fill-month"></div>
            </div>
            <p class="progress-text" id="text-month">Month: 0%</p>
        </div>

        <div class="progress-item">
            <div class="progress-outline">
                <div class="progress-fill" id="fill-week"></div>
            </div>
            <p class="progress-text" id="text-week">Week: 0%</p>
        </div>

        <div class="progress-item">
            <div class="progress-outline">
                <div class="progress-fill" id="fill-day"></div>
            </div>
            <p class="progress-text" id="text-day">Day: 0%</p>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // 核心算法：时间戳差值比例推演
    // ==========================================
    function updateTimeProgress() {
        const now = new Date();
        const nowMs = now.getTime(); // 获取当前绝对毫秒级时间戳

        const year = now.getFullYear();
        const month = now.getMonth();
        const date = now.getDate();

        // 1. Day 进度
        const startOfDay = new Date(year, month, date).getTime();
        const dayTotalMs = 24 * 60 * 60 * 1000;
        const dayProgress = (nowMs - startOfDay) / dayTotalMs;

        // 2. Week 进度 (前提假设：周一为一周起点)
        const dayOfWeek = now.getDay();
        const diffToMonday = dayOfWeek === 0 ? 6 : dayOfWeek - 1; // 周日转为6，其他减1
        const startOfWeek = new Date(year, month, date - diffToMonday).getTime();
        const weekTotalMs = 7 * 24 * 60 * 60 * 1000;
        const weekProgress = (nowMs - startOfWeek) / weekTotalMs;

        // 3. Month 进度
        const startOfMonth = new Date(year, month, 1).getTime();
        const startOfNextMonth = new Date(year, month + 1, 1).getTime();
        const monthProgress = (nowMs - startOfMonth) / (startOfNextMonth - startOfMonth);

        // 4. Year 进度
        const startOfYear = new Date(year, 0, 1).getTime();
        const startOfNextYear = new Date(year + 1, 0, 1).getTime();
        const yearProgress = (nowMs - startOfYear) / (startOfNextYear - startOfYear);

        // ==========================================
        // DOM 注入与视图更新
        // ==========================================
        const dataMap = [
            { id: 'year', percent: Math.floor(yearProgress * 100), label: 'Year' },
            { id: 'month', percent: Math.floor(monthProgress * 100), label: 'Month' },
            { id: 'week', percent: Math.floor(weekProgress * 100), label: 'Week' },
            { id: 'day', percent: Math.floor(dayProgress * 100), label: 'Day' }
        ];

        dataMap.forEach(item => {
            // UI宽度和数值均基于严格的数学推演结果
            document.getElementById(`fill-${item.id}`).style.width = `${item.percent}%`;
            document.getElementById(`text-${item.id}`).innerText = `${item.label}: ${item.percent}%`;
        });
    }

    // 初始化并设定每秒计算一次，保障随时间推移的自适应刷新
    updateTimeProgress();
    setInterval(updateTimeProgress, 1000);
</script>

</body>
</html>
