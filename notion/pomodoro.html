<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>番茄钟定时器</title>
    <style>
        /* 基础重置，确保在Notion里不留白 */
        body {
            margin: 0;
            padding: 0;
            background: white;
        }

        .container {
            display: flex;
            width: 100%;
            min-height: 120px; /* 改为最小高度，允许换行后伸展 */
            background: white;
            padding: 10px 0;
            align-items: center;
            justify-content: center;
        }

        .pomodoro-section {
            display: flex;
            width: 100%;
            align-items: center;
            justify-content: center;
            gap: 20px; /* 缩小了原本50px的间距 */
            flex-wrap: wrap; /* 核心修改：宽度不足时自动换行 */
        }

        #timer {
            font-size: 64px;
            font-weight: bold;
            color: #4b4b48;
            margin: 0;
            line-height: 1;
        }

        .buttons-container {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: center;
            gap: 12px;
            width: 210px; /* 略微缩小宽度以适应窄列 */
        }

        /* 按钮组布局 */
        .quick-time-btns {
            display: flex;
            justify-content: space-between;
            gap: 4px;
        }
        
        .control-btns {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-top: 0;
        }

        /* 通用按钮样式保持不变 */
        button {
            padding: 6px 0;
            background: white;
            color: #4b4b48;
            border: 1px solid #4b4b48;
            border-radius: 20px;
            cursor: pointer;
            box-sizing: border-box;
            text-align: center;
            font-size: 14px;
        }
        
        button:hover {
            background: #f5f5f5;
        }
        
        .quick-time-btns button {
            flex: 1; /* 让三个按钮平分宽度 */
        }
        
        .control-btns button {
            flex: 1; /* 平分宽度 */
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="pomodoro-section">
            <div id="timer">00:00</div>
            <div class="buttons-container">
                <div class="quick-time-btns">
                    <button onclick="setTime(25)">25min</button>
                    <button onclick="setTime(5)">5min</button>
                    <button onclick="setTime(15)">15min</button>
                </div>
                <div class="control-btns">
                    <button id="pauseBtn" onclick="togglePause()">暂停</button>
                    <button onclick="stopTimer()">停止</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let timeLeft = 0;
        let timerId = null;
        let isPaused = false;
        const audio = new Audio('https://img.tukuppt.com/newpreview_music/09/00/55/5c89339401f8a46437.mp3');

        function updateDisplay(seconds) {
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;
            document.getElementById('timer').textContent = 
                `${String(minutes).padStart(2, '0')}:${String(remainingSeconds).padStart(2, '0')}`;
        }

        function setTime(minutes) {
            timeLeft = minutes * 60;
            updateDisplay(timeLeft);
            startTimer();
        }

        function startTimer() {
            if (timerId) clearInterval(timerId);
            isPaused = false;
            document.getElementById('pauseBtn').textContent = '暂停';
            
            timerId = setInterval(() => {
                if (!isPaused) {
                    timeLeft--;
                    updateDisplay(timeLeft);
                    
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        audio.loop = true;
                        audio.play();
                    }
                }
            }, 1000);
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pauseBtn').textContent = isPaused ? '继续' : '暂停';
        }

        function stopTimer() {
            clearInterval(timerId);
            timeLeft = 0;
            updateDisplay(0);
            audio.pause();
            audio.currentTime = 0;
        }
    </script>
</body>
</html>
