<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>番茄钟定时器</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: white;
            overflow: hidden; /* 严禁滚动条 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        .container {
            display: flex;
            width: 80vw;
            height: 100vh;
            background: white;
            align-items: center;
            justify-content: center;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .pomodoro-section {
            display: flex;
            flex-direction: row; /* 强制横向 */
            flex-wrap: nowrap;   /* 严禁换行 */
            align-items: center;
            justify-content: center;
            width: 100%;
            gap: clamp(10px, 4vw, 40px); /* 间距随宽度自动缩小 */
        }

        #timer {
            /* 字体大小根据屏幕宽度动态调整，确保不撑破容器 */
            font-size: clamp(40px, 12vw, 80px); 
            font-weight: bold;
            color: #4b4b48;
            margin: 0;
            line-height: 1;
            flex-shrink: 1; /* 空间不足时允许时间缩小 */
            text-align: right;
            min-width: 1.2em; /* 保证数字占位稳定 */
        }

        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 220px;   /* 按钮组固定宽度，确保点击体验 */
            flex-shrink: 0; /* 严禁按钮组被压缩 */
        }

        .quick-time-btns, .control-btns {
            display: flex;
            justify-content: space-between;
            gap: 6px;
        }

        button {
            flex: 1;
            padding: 8px 0;
            background: white;
            color: #4b4b48;
            border: 1px solid #4b4b48;
            border-radius: 20px;
            cursor: pointer;
            box-sizing: border-box;
            font-size: 13px;
            white-space: nowrap;
            transition: background 0.2s;
        }
        
        button:hover {
            background: #f5f5f5;
        }

        /* 极窄屏幕下的最后保底逻辑 */
        @media (max-width: 350px) {
            .pomodoro-section { gap: 8px; }
            .buttons-container { width: 180px; }
            button { font-size: 11px; padding: 5px 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="pomodoro-section">
            <div id="timer">00:00</div>
            <div class="buttons-container">
                <div class="quick-time-btns">
                    <button onclick="setTime(25)">25min</button>
                    <button onclick="setTime(5)">5min</button>
                    <button onclick="setTime(15)">15min</button>
                </div>
                <div class="control-btns">
                    <button id="pauseBtn" onclick="togglePause()">暂停</button>
                    <button onclick="stopTimer()">停止</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let timeLeft = 0;
        let timerId = null;
        let isPaused = false;
        const audio = new Audio('https://img.tukuppt.com/newpreview_music/09/00/55/5c89339401f8a46437.mp3');

        function updateDisplay(seconds) {
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;
            document.getElementById('timer').textContent = 
                `${String(minutes).padStart(2, '0')}:${String(remainingSeconds).padStart(2, '0')}`;
        }

        function setTime(minutes) {
            timeLeft = minutes * 60;
            updateDisplay(timeLeft);
            startTimer();
        }

        function startTimer() {
            if (timerId) clearInterval(timerId);
            isPaused = false;
            document.getElementById('pauseBtn').textContent = '暂停';
            
            timerId = setInterval(() => {
                if (!isPaused) {
                    timeLeft--;
                    updateDisplay(timeLeft);
                    
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        audio.loop = true;
                        audio.play();
                    }
                }
            }, 1000);
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pauseBtn').textContent = isPaused ? '继续' : '暂停';
        }

        function stopTimer() {
            clearInterval(timerId);
            timeLeft = 0;
            updateDisplay(0);
            audio.pause();
            audio.currentTime = 0;
        }
    </script>
</body>
</html>
