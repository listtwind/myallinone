<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>番茄钟-绝对定位版</title>
    <style>
        :root {
            --main-color: #4b4b48;
            --bg-color: #ffffff;
            --container-width: 500px;
            --container-height: 160px;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        /* 外层容器：模拟图片的固定画布 */
        .canvas {
            position: relative;
            width: var(--container-width);
            height: var(--container-height);
            margin: 0 auto;
            background: var(--bg-color);
        }

        /* 计时器：固定在左侧 30px 处 */
        #timer {
            position: absolute;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 82px;
            font-weight: 700;
            color: var(--main-color);
            line-height: 1;
            letter-spacing: -2px;
        }

        /* 按钮组容器：固定在右侧 30px 处 */
        .buttons-group {
            position: absolute;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            width: 210px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .row {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        button {
            flex: 1;
            height: 34px;
            background: white;
            color: var(--main-color);
            border: 1px solid #d3d3d3;
            border-radius: 17px; /* 胶囊形状 */
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
            outline: none;
            white-space: nowrap;
        }

        button:hover {
            background: #f0f0f0;
        }

        button:active {
            background: #e5e5e5;
        }

        /* 针对下方两个大按钮的特殊处理（如果需要与上方三按钮视觉对齐） */
        .control-btns button {
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="canvas">
        <div id="timer">00:00</div>
        
        <div class="buttons-group">
            <div class="row">
                <button onclick="setTime(25)">25m</button>
                <button onclick="setTime(5)">5m</button>
                <button onclick="setTime(15)">15m</button>
            </div>
            <div class="row control-btns">
                <button id="pauseBtn" onclick="togglePause()">暂停</button>
                <button onclick="stopTimer()">停止</button>
            </div>
        </div>
    </div>

    <script>
        let timeLeft = 0;
        let timerId = null;
        let isPaused = false;
        const audio = new Audio('https://img.tukuppt.com/newpreview_music/09/00/55/5c89339401f8a46437.mp3');

        function updateDisplay(seconds) {
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;
            document.getElementById('timer').textContent = 
                `${String(minutes).padStart(2, '0')}:${String(remainingSeconds).padStart(2, '0')}`;
        }

        function setTime(minutes) {
            timeLeft = minutes * 60;
            updateDisplay(timeLeft);
            startTimer();
        }

        function startTimer() {
            if (timerId) clearInterval(timerId);
            isPaused = false;
            document.getElementById('pauseBtn').textContent = '暂停';
            
            timerId = setInterval(() => {
                if (!isPaused) {
                    timeLeft--;
                    updateDisplay(timeLeft);
                    
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        audio.loop = true;
                        audio.play();
                    }
                }
            }, 1000);
        }

        function togglePause() {
            if (timeLeft <= 0) return;
            isPaused = !isPaused;
            document.getElementById('pauseBtn').textContent = isPaused ? '继续' : '暂停';
        }

        function stopTimer() {
            clearInterval(timerId);
            timeLeft = 0;
            updateDisplay(0);
            audio.pause();
            audio.currentTime = 0;
            document.getElementById('pauseBtn').textContent = '暂停';
        }
    </script>
</body>
</html>
