<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>番茄钟定时器</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* 严禁滚动条 */
            background: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* 使用 Grid 布局强制分左右两列 */
        .container {
            display: grid;
            grid-template-columns: 1.2fr 1fr; /* 左侧时间略宽，右侧按钮略窄，比例可调 */
            align-items: center;
            height: 100vh;
            width: 100vw;
            padding: 0 15px;
            box-sizing: border-box;
            gap: 20px; /* 左右两部分的间距 */
        }

        /* 时间部分 */
        #timer {
            /* 使用 vw 单位确保字体随宽度缩放，设置最大最小值防止失控 */
            font-size: clamp(32px, 10vw, 80px);
            font-weight: bold;
            color: #4b4b48;
            text-align: right; /* 时间靠右对齐，靠近中间分割线 */
            line-height: 1;
            white-space: nowrap;
        }

        /* 按钮容器部分 */
        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 200px; /* 限制按钮组的最大宽度 */
            justify-content: center;
        }

        .quick-time-btns, .control-btns {
            display: flex;
            gap: 6px;
            width: 100%;
        }

        button {
            flex: 1;
            padding: 8px 0;
            background: white;
            color: #4b4b48;
            border: 1px solid #4b4b48;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
            transition: background 0.2s;
            min-width: 0; /* 允许按钮在极窄情况下缩小 */
        }
        
        button:hover {
            background: #f5f5f5;
        }

        /* 针对极窄情况的微调 */
        @media (max-width: 450px) {
            .container { gap: 10px; padding: 0 5px; }
            button { font-size: 11px; padding: 5px 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="timer">00:00</div>
        
        <div class="buttons-container">
            <div class="quick-time-btns">
                <button onclick="setTime(25)">25m</button>
                <button onclick="setTime(5)">5m</button>
                <button onclick="setTime(15)">15m</button>
            </div>
            <div class="control-btns">
                <button id="pauseBtn" onclick="togglePause()">暂停</button>
                <button onclick="stopTimer()">停止</button>
            </div>
        </div>
    </div>

    <script>
        // 逻辑保持完全不变
        let timeLeft = 0;
        let timerId = null;
        let isPaused = false;
        const audio = new Audio('https://img.tukuppt.com/newpreview_music/09/00/55/5c89339401f8a46437.mp3');

        function updateDisplay(seconds) {
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;
            document.getElementById('timer').textContent = 
                `${String(minutes).padStart(2, '0')}:${String(remainingSeconds).padStart(2, '0')}`;
        }

        function setTime(minutes) {
            timeLeft = minutes * 60;
            updateDisplay(timeLeft);
            startTimer();
        }

        function startTimer() {
            if (timerId) clearInterval(timerId);
            isPaused = false;
            document.getElementById('pauseBtn').textContent = '暂停';
            
            timerId = setInterval(() => {
                if (!isPaused) {
                    timeLeft--;
                    updateDisplay(timeLeft);
                    
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        audio.loop = true;
                        audio.play();
                    }
                }
            }, 1000);
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pauseBtn').textContent = isPaused ? '继续' : '暂停';
        }

        function stopTimer() {
            clearInterval(timerId);
            timeLeft = 0;
            updateDisplay(0);
            audio.pause();
            audio.currentTime = 0;
        }
    </script>
</body>
</html>
